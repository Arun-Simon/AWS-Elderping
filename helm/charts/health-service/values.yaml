# Default values for auth-service.
replicaCount: 2

image:
  repository: arunnsimon/elderpinq-health-service
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: "alb"
  annotations:
    alb.ingress.kubernetes.io/group.name: elderpinq-ingress-group
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
  hosts:
    - host: api.elderping.online
      paths:
        - path: /api/health
          pathType: Prefix

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

env:
  environment: "dev"
  dbHost: "health-db"
  dbPort: "5432"
  dbName: "health_db"
  dbUser: "elderpinq_admin"
  jwtSecret: "temp-secret"
  cognitoUserPoolId: ""
  awsRegion: "us-east-1"

# Telemetry Configuration
metrics:
  enabled: true
  path: "/metrics"

# PSS Hardening Configurations
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

# Security and High Availability Policies
networkPolicy:
  enabled: true

pdb:
  enabled: true
  minAvailable: 1

serviceAccount:
  create: true
  name: "health-service"
  annotations: {}

